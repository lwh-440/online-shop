{% extends "base.html" %}

{% block title %}付款 - 在线购物网站{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 3rem auto;">
    <div class="card">
        <div class="card-header">
            <h3>订单付款</h3>
        </div>
        <div class="card-body">
            <p>订单号: #{{ order.id }}</p>
            <p>金额: ¥{{ "%.2f"|format(order.total_amount) }}</p>
            <p>当前状态: 待付款</p>
            <hr>
            <form method="POST">
                <div class="form-group">
                    <label>模拟支付</label>
                    <p><small>点击下方按钮完成付款（模拟）</small></p>
                </div>
                <button type="submit" class="btn btn-success" style="width:100%;">确认付款</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
